# ============================================================
# XSS Detection Project Configuration
# Team Blackhat — University of East London
# ============================================================

# Data settings
data:
  raw_url: "https://raw.githubusercontent.com/fawaz2015/XSS-dataset/main/Data_66_featurs.csv"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  raw_filename: "Data_66_featurs.csv"
  target_column: "class"
  test_size: 0.15
  val_size: 0.15
  random_state: 42

# Model hyperparameters
models:
  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 200
    max_depth: 8
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    eval_metric: "logloss"

  logistic_regression:
    max_iter: 1000
    random_state: 42
    solver: "lbfgs"
    C: 1.0

# Training settings
training:
  cv_folds: 5
  scoring: "f1"
  random_state: 42

# Output paths
output:
  models_dir: "models"
  figures_dir: "figures"
  report_dir: "report"
